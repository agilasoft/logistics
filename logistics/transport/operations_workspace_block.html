<div class="trw-ops-dash log-ab-dash run-sheet-dash" data-link-doctype="Transport Job">
  <div class="log-ab-banner alert alert-warning trw-ops-banner" style="display:none;margin:0 1.5rem 0.75rem;"></div>
  <div class="log-ab-top">
    <div class="run-sheet-header log-ab-head ab-summary-header-card">
      <div class="log-ab-head-stack">
        <div class="log-ab-top-row">
          <div class="log-ab-hero-col">
            <img class="log-ab-logo-img trw-ops-company-logo" alt="" style="display:none;" />
            <span class="log-ab-logo-ph trw-ops-logo-ph">Co</span>
          </div>
          <div class="log-ab-main-block">
            <div class="trw-ops-page-title"></div>
            <div class="log-ab-meta-cluster trw-ops-meta-cluster"></div>
          </div>
          <div class="ab-summary-aside">
            <div class="ab-ring-wrap">
              <div class="ab-ring ab-ring--status-submitted trw-ops-alert-ring" style="--ab-pct:0"></div>
              <div class="ab-ring-center">
                <span class="ab-ring-pct trw-ops-ring-pct">0</span>
                <span class="ab-ring-cap trw-ops-ring-cap">shipments</span>
              </div>
            </div>
          </div>
        </div>
        <div class="log-ab-body-block">
          <div class="header-details trw-ops-kpis"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="ab-tab-shell">
    <input type="radio" name="trw_ops_tabs" id="trw_ops_heat" class="ab-dash-tab-input" checked>
    <input type="radio" name="trw_ops_tabs" id="trw_ops_wf" class="ab-dash-tab-input">
    <input type="radio" name="trw_ops_tabs" id="trw_ops_alert" class="ab-dash-tab-input">
    <div class="ab-tab-bar">
      <label for="trw_ops_heat" class="ab-tlabel">HeatMap</label>
      <label for="trw_ops_wf" class="ab-tlabel">Workflow Center</label>
      <label for="trw_ops_alert" class="ab-tlabel">Alerts and Notifications <span class="ab-tab-count trw-ops-alerts-tab-count">(0)</span></label>
    </div>
    <div class="ab-ro-body">
      <div class="ab-tab-panels ab-ro-shell">
        <div class="ab-tab-panel ab-tab-panel-route">
          <div class="log-ab-ro-card log-ab-ro-card--flush trw-ops-heat-card">
            <div class="trw-ops-heat-toolbar">
              <button type="button" class="btn btn-default btn-xs afw-hub-refresh" title="Refresh"><i class="fa fa-refresh"></i></button>
              <span class="trw-ops-user-filter trw-ops-status-filter"><span class="trw-ops-user-filter-lbl">Status</span>
              <select class="form-control input-xs trw-ops-filter-status">
                <option value="ongoing" selected>Ongoing (no draft)</option>
                <option value="open">Ongoing (incl. draft)</option>
                <option value="Draft">Draft</option>
                <option value="Submitted">Submitted</option>
                <option value="In Progress">In Progress</option>
                <option value="Reopened">Reopened</option>
                <option value="Completed">Completed</option>
                <option value="Closed">Closed</option>
                <option value="Cancelled">Cancelled</option>
              </select></span>
              <span class="trw-ops-user-filter trw-ops-traffic-filter"><span class="trw-ops-user-filter-lbl">Traffic</span>
              <select class="form-control input-xs trw-ops-filter-traffic">
                <option value="all">All</option>
                <option value="import">Import</option>
                <option value="export">Export</option>
                <option value="domestic">Domestic</option>
              </select></span>
              <span class="trw-ops-user-filter"><span class="trw-ops-user-filter-lbl">Owner</span>
              <select class="form-control input-xs trw-ops-filter-user"></select></span>
              <span class="trw-ops-user-filter trw-ops-airline-filter"><span class="trw-ops-user-filter-lbl">Transport companies</span>
              <div class="trw-ops-airline-ms">
                <button type="button" class="btn btn-default btn-xs form-control text-left trw-ops-airline-dd-toggle" aria-expanded="false" aria-haspopup="listbox">
                  <span class="trw-ops-airline-summary"></span>
                </button>
                <div class="trw-ops-airline-dd-panel" role="listbox">
                  <div class="trw-ops-airline-checkboxes"></div>
                </div>
              </div></span>
            </div>
            <div class="afw-hub-map-host">
              <div class="afw-hub-map"></div>
            </div>
          </div>
        </div>
        <div class="ab-tab-panel ab-tab-panel-milestones">
          <div class="log-ab-ro-card trw-ops-wf-card">
            <div class="trw-ops-wf-title">Workflow Center</div>
            <p class="text-muted small trw-ops-wf-desc">Approvals, tasks, and workflow items for logistics are available in the Workflow Center workspace.</p>
            <p><a class="btn btn-primary btn-sm trw-ops-wf-link" href="/app/workflow-cockpit">Open Workflow Center</a></p>
          </div>
        </div>
        <div class="ab-tab-panel ab-tab-panel-alerts">
          <div class="log-ab-ro-card">
            <div class="trw-ops-alerts-booking-format">
              <div class="dash-alerts-section trw-ops-dash-alerts-section"></div>
              <div class="doc-alerts-cards-wrapper trw-ops-ops-alert-cards-wrap" style="margin-bottom: 0;">
                <div class="doc-alerts-cards trw-ops-ops-alert-cards"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
